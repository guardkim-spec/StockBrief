name: StockBrief Nightly Pipeline

on:
  schedule:
    # 19:00 KST = 10:00 UTC (summer), 10:00 UTC (winter)
    # Run at 10:00 UTC daily — steps self-time via orchestrator
    - cron: "0 10 * * 1-5"
  workflow_dispatch:
    inputs:
      date:
        description: "날짜 (YYYY-MM-DD, 기본: 오늘)"
        required: false
        default: ""
      dry_run:
        description: "드라이런 (true: 실제 발송/저장 안 함)"
        required: false
        default: "false"
      force:
        description: "강제 재실행 (true: 이미 완료된 날짜도 재실행)"
        required: false
        default: "false"

jobs:
  pipeline:
    runs-on: self-hosted
    timeout-minutes: 90
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip setuptools
          pip install -r requirements.txt

      - name: Run pipeline
        working-directory: backend
        env:
          GEMINI_API_KEY:             ${{ secrets.GEMINI_API_KEY }}
          GMAIL_OAUTH_TOKEN:          ${{ secrets.GMAIL_OAUTH_TOKEN }}
          GMAIL_SENDER:               ${{ secrets.GMAIL_SENDER }}
          GMAIL_RECIPIENT:            ${{ secrets.GMAIL_RECIPIENT }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GITHUB_TOKEN:               ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER:               ${{ github.repository_owner }}
          GITHUB_REPO:                ${{ github.event.repository.name }}
          KRX_ID:                     ${{ secrets.KRX_ID }}
          KRX_PW:                     ${{ secrets.KRX_PW }}
          PIPELINE_DATE:              ${{ github.event.inputs.date }}
          PIPELINE_DRY_RUN:           ${{ github.event.inputs.dry_run }}
          PIPELINE_FORCE:             ${{ github.event.inputs.force }}
        run: python -m pipeline.orchestrator

      - name: Sync local data directory
        if: success()
        shell: powershell
        run: git -C D:\StockBrief pull origin main

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_id }}
          path: backend/logs/
          retention-days: 7